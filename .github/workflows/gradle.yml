name: build
on:
  - push
  - pull_request

permissions:
  contents: write

jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        dependency-graph: generate-and-submit
    - name: Execute Gradle build
      run: ./gradlew build
